name: CI/CD - Build, Push & Deploy to EKS

on:
  # push:
  #   branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  EKS_CLUSTER: ${{ secrets.EKS_CLUSTER_NAME }}

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    name: Build & push images to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          for name in identity-service salary-submission-service search-service stat-service vote-service bff-service frontend; do
            aws ecr describe-repositories --repository-names "cloudsalaryhub/$name" >/dev/null 2>&1 \
              || aws ecr create-repository \
                   --repository-name "cloudsalaryhub/$name" \
                   --image-scanning-configuration scanOnPush=true \
                   --image-tag-mutability MUTABLE >/dev/null
          done

      - name: Build & push images
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          SERVICES=(
            "identity-service:identity-service/Dockerfile:."
            "salary-submission-service:salary-submission-service/Dockerfile:."
            "search-service:search-service/Dockerfile:."
            "stat-service:stat-service/Dockerfile:."
            "vote-service:vote-service/Dockerfile:."
            "bff-service:bff-service/Dockerfile:."
            "frontend:frontend/Dockerfile:./frontend"
          )
          for entry in "${SERVICES[@]}"; do
            IFS=':' read -r name dockerfile context <<< "$entry"
            REPO="$ECR_REGISTRY/cloudsalaryhub/$name"
            docker build -f "$dockerfile" -t "$REPO:$TAG" -t "$REPO:latest" "$context"
            docker push "$REPO:$TAG"
            docker push "$REPO:latest"
          done

  deploy:
    name: Deploy to EKS
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "$AWS_REGION"

      - name: Render manifests (substitute ECR_REGISTRY & IMAGE_TAG)
        run: |
          set -euo pipefail
          mkdir -p rendered
          # Whitelist the variables to substitute so nginx config ($host, $uri, ...) is left intact.
          for f in k8s/*.yaml; do
            envsubst '${ECR_REGISTRY} ${IMAGE_TAG}' < "$f" > "rendered/$(basename "$f")"
          done
          echo "--- rendered image lines ---"
          grep -h "image:" rendered/*.yaml || true

      - name: Apply manifests
        run: |
          set -euo pipefail
          kubectl apply -f rendered/namespace.yaml
          if ! kubectl apply -f rendered/storageclass.yaml; then
            kubectl delete storageclass gp3 --ignore-not-found
            kubectl apply -f rendered/storageclass.yaml
          fi
          kubectl apply -f rendered/

      - name: Wait for rollouts
        run: |
          set -euo pipefail
          for d in identity-service salary-submission-service search-service stat-service vote-service bff-service frontend; do
            kubectl -n app rollout status deployment/$d --timeout=300s
          done
          kubectl -n data rollout status statefulset/postgres --timeout=300s

      - name: Summary
        run: |
          echo "--- app namespace ---"
          kubectl -n app  get deployments,pods,svc,ingress
          echo "--- data namespace ---"
          kubectl -n data get statefulset,pods,svc,pvc
          echo "--- ALB DNS ---"
          kubectl -n app get ingress cloudsalaryhub-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}{"\n"}'

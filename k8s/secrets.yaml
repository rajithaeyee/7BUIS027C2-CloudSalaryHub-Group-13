apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: app
  labels:
    app.kubernetes.io/part-of: cloudsalaryhub
  annotations:
    app.kubernetes.io/description: "Sensitive credentials consumed by app-namespace microservices"
type: Opaque
stringData:
  # -------------------------------------------------------
  # dev only — these placeholder values are for minikube/microk8s.
  # -------------------------------------------------------
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  JWT_SECRET: "change-me-in-production"
  DATABASE_URL: "postgresql://postgres:postgres@postgres.data.svc.cluster.local:5432/cloud-salary-hub"

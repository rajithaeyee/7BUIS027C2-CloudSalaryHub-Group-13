apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-service
  namespace: app
  labels:
    app.kubernetes.io/name: vote-service
    app.kubernetes.io/part-of: cloudsalaryhub
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vote-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vote-service
        app.kubernetes.io/part-of: cloudsalaryhub
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: vote-service
          # Local (microk8s / minikube) — Docker Hub image:
          # image: rajithaeyee/cloudsalaryhub-vote-service:latest
          # AWS EKS rendered by GitHub Actions via envsubst:
          image: ${ECR_REGISTRY}/cloudsalaryhub/vote-service:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8005
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

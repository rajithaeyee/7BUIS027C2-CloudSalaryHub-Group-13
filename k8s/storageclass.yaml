apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  labels:
    app.kubernetes.io/part-of: cloudsalaryhub
  annotations:
    app.kubernetes.io/description: "Default EBS gp3 StorageClass for EKS — used by Postgres PVC."
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Retain
parameters:
  type: gp3
  encrypted: "true"
  fsType: ext4

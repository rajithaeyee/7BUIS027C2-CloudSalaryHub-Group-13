apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: cloudsalaryhub
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: cloudsalaryhub
    app.kubernetes.io/component: database
  annotations:
    app.kubernetes.io/description: "Headless service for PostgreSQL StatefulSet — provides stable DNS (postgres-0.postgres)"
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: tcp-postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
